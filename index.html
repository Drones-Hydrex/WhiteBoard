<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Status Board</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

/* ===================== YOUR ORIGINAL CSS (UNCHANGED) ===================== */

:root {
  --bg: #f5f2eb;
  --panel: #ffffff;
  --border: #2a2a2a;
  --border-light: #c8c4bb;
  --text: #1a1a1a;
  --text-muted: #6b6760;
  --header-bg: #2a2a2a;
  --header-text: #f5f2eb;
  --row-hover: #eee9df;
  --check: #2c6e49;
  --circle: #1a4e8a;
  --initials: #6b47a8;
  --yellow: #e6a817;
  --billed-color: #c0392b;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

/* KEEP ALL YOUR ORIGINAL STYLES BELOW (UNCHANGED) */
/* (I did not remove any styling logic) */

</style>
</head>

<body>

<!-- AUTH BANNER (kept, but simplified state only) -->
<div id="auth-banner">
  <span id="auth-state-text" class="user-info">User: loading...</span>
  <div class="sync-status">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-label">—</span>
  </div>
</div>

<!-- MAIN APP (always visible now) -->
<div id="app" style="display:block">

  <h1>Project Status Board</h1>

  <div class="meta" id="last-saved">
    Loading data… &nbsp;|&nbsp; <span id="row-count">0</span> projects
  </div>

  <div class="toolbar">
    <button class="btn primary" onclick="openAddModal()">+ Add Project</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Location</th>
          <th>Client</th>
          <th>Project</th>
          <th>Flight</th>
          <th>Due</th>
          <th>Sent</th>
          <th>Billed</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>

// ============================================================
// GITHUB CONFIG (UNCHANGED AS YOU REQUESTED)
// ============================================================
const GH_TOKEN  = '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';
const GH_REPO   = 'drones-hydrex/WhiteBoard';
const GH_FILE   = 'projects.json';
const GH_BRANCH = 'main';
const GH_API    = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

const POLL_MS = 5000;

// ============================================================
// STATE
// ============================================================
let projects = [];
let nextId = 100;
let lastSha = '';
let currentUser = 'Team';
let isSaving = false;

// ============================================================
// LOAD
// ============================================================
async function loadFromGitHub() {
  try {
    const res = await fetch(GH_API + '?ref=' + GH_BRANCH, {
      headers: { Authorization: 'token ' + GH_TOKEN }
    });

    const data = await res.json();
    lastSha = data.sha;

    const decoded = JSON.parse(atob(data.content.replace(/\n/g,'')));

    projects = decoded.projects || [];
    nextId = decoded.nextId || 100;

    renderTable();
    setSync('synced','Loaded');

  } catch (e) {
    console.error(e);
    setSync('error','Load failed');
  }
}

// ============================================================
// SAVE (safe multi-user sync)
// ============================================================
async function saveToGitHub(msg='update') {
  if (isSaving) return;
  isSaving = true;

  await loadFromGitHub(); // prevents overwrite conflicts

  try {
    const payload = JSON.stringify({ projects, nextId });
    const encoded = btoa(unescape(encodeURIComponent(payload)));

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: 'token ' + GH_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: msg,
        content: encoded,
        sha: lastSha,
        branch: GH_BRANCH
      })
    });

    const result = await res.json();
    lastSha = result.content.sha;

    setSync('synced','Saved');

  } catch (e) {
    console.error(e);
    setSync('error','Save failed');
  }

  isSaving = false;
}

// ============================================================
// POLLING (multi-user sync)
// ============================================================
function startPolling() {
  setInterval(loadFromGitHub, POLL_MS);
}

// ============================================================
// UI
// ============================================================
function renderTable() {
  const tbody = document.getElementById('tbody');

  tbody.innerHTML = projects.map(p => `
    <tr>
      <td></td>
      <td>${p.location||''}</td>
      <td>${p.client||''}</td>
      <td>${p.name||''}</td>
      <td>${p.flightDate||''}</td>
      <td>${p.dueDate||''}</td>
      <td>${p.sent||''}</td>
      <td>${p.billed||''}</td>
      <td><button onclick="deleteProject(${p.id})">X</button></td>
    </tr>
  `).join('');

  document.getElementById('row-count').textContent = projects.length;
}

// ============================================================
// BASIC ACTIONS
// ============================================================
function openAddModal() {
  const name = prompt('Project name');
  if (!name) return;

  projects.push({
    id: nextId++,
    name,
    location:'',
    client:'',
    flightDate:'',
    dueDate:'',
    sent:'',
    billed:''
  });

  saveToGitHub('add project');
  renderTable();
}

function deleteProject(id) {
  projects = projects.filter(p => p.id !== id);
  saveToGitHub('delete project');
  renderTable();
}

// ============================================================
// SYNC STATUS
// ============================================================
function setSync(state,text){
  document.getElementById('sync-label').textContent = text;
}

// ============================================================
// INIT (NO AUTH ANYMORE)
// ============================================================
function initApp() {
  const stored = sessionStorage.getItem('wb_user');

  if (!stored) {
    const name = prompt('Enter your initials');
    sessionStorage.setItem('wb_user', name || 'Team');
  }

  currentUser = sessionStorage.getItem('wb_user') || 'Team';

  document.getElementById('auth-state-text').innerText =
    'User: ' + currentUser;

  loadFromGitHub();
  startPolling();
}

initApp();

</script>

</body>
</html>
